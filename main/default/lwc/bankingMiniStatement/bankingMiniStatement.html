<template>
    <article class="banking-shell">
        <header class="app-header">
            <div class="brand-mark">
                <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
            </div>
            <div class="header-copy">
                <p class="eyebrow">Banking Assistant</p>
                <h2>Mini Statement</h2>
            </div>
            <template if:true={sessionVerifiedLocal}>
                <lightning-badge label="Verified" class="verified-badge"></lightning-badge>
            </template>
        </header>

        <template if:false={sessionVerifiedLocal}>
            <section class="auth-panel" aria-labelledby="auth-title">
                <div class="secure-icon">
                    <lightning-icon icon-name="utility:lock" variant="inverse" size="small"></lightning-icon>
                </div>
                <p class="eyebrow">Secure Step</p>
                <h3 id="auth-title">Verify customer identity</h3>
                <p class="helper-text">
                    We'll send a 4-digit OTP to <strong>{maskedPhone}</strong>.
                </p>

                <template if:true={isOtpSending}>
                    <div class="otp-status status-info" role="status">
                        <lightning-icon icon-name="utility:sync" size="xx-small"></lightning-icon>
                        <span>{otpStatusText}</span>
                    </div>
                </template>

                <template if:true={isOtpSent}>
                    <div class="otp-status status-success" role="status">
                        <lightning-icon icon-name="utility:success" variant="success" size="xx-small"></lightning-icon>
                        <span>{otpStatusText}</span>
                    </div>
                    <!-- <p class="demo-code">
                        Demo OTP: <strong>{generatedOtp}</strong>
                    </p> -->
                </template>

                <template if:true={hasOtpDeliveryError}>
                    <div class="otp-status status-error" role="alert">
                        <lightning-icon icon-name="utility:error" variant="error" size="xx-small"></lightning-icon>
                        <span>{otpStatusText}</span>
                    </div>
                </template>

                <div class="otp-field">
                    <lightning-input
                        type="text"
                        max-length="4"
                        variant="label-hidden"
                        value={userEnteredOtp}
                        onchange={handleOtpChange}
                        placeholder="Enter OTP"
                        disabled={isVerifyDisabled}
                        class="otp-input">
                    </lightning-input>
                </div>

                <template if:true={showError}>
                    <div class="error-message" role="alert">
                        <lightning-icon icon-name="utility:error" variant="error" size="xx-small"></lightning-icon>
                        <span>Incorrect OTP. Please try again.</span>
                    </div>
                </template>

                <div class="auth-actions">
                    <lightning-button
                        variant="brand"
                        label="Verify Identity"
                        onclick={verifyOtp}
                        disabled={isVerifyDisabled}
                        class="primary-action">
                    </lightning-button>
                    <button type="button" class="link-button" onclick={resendOtp} disabled={isOtpSending}>Resend OTP</button>
                </div>
            </section>
        </template>

        <template if:true={sessionVerifiedLocal}>
            <section class="customer-panel" aria-label="Customer summary">
                <div class="customer-main">
                    <div>
                        <p class="customer-name">{customerName}</p>
                        <p class="customer-detail">
                            <lightning-icon icon-name="utility:world" size="xx-small"></lightning-icon>
                            <span>{preferredLanguage}</span>
                        </p>
                    </div>
                    <div class="risk-block">
                        <span>Retention Risk</span>
                        <lightning-badge label={churnRisk} class={riskBadgeClass}></lightning-badge>
                    </div>
                </div>
            </section>

            <section class="section-block" aria-labelledby="portfolio-title">
                <div class="section-heading">
                    <h3 id="portfolio-title">Portfolio Overview</h3>
                </div>
                <div class="portfolio-grid">
                    <div class="metric-tile metric-positive">
                        <div class="tile-icon">
                            <lightning-icon icon-name="utility:moneybag" size="x-small"></lightning-icon>
                        </div>
                        <p>Checking Available</p>
                        <strong>₹<lightning-formatted-number value={checkingBalance}></lightning-formatted-number></strong>
                    </div>
                    <div class="metric-tile metric-alert">
                        <div class="tile-icon">
                            <lightning-icon icon-name="utility:credit_card" size="x-small"></lightning-icon>
                        </div>
                        <p>Credit Card Due</p>
                        <strong>₹<lightning-formatted-number value={creditCardBalance}></lightning-formatted-number></strong>
                    </div>
                    <div class="metric-tile metric-neutral">
                        <div class="tile-icon">
                            <lightning-icon icon-name="utility:home" size="x-small"></lightning-icon>
                        </div>
                        <p>Home Loan Remaining</p>
                        <strong>₹<lightning-formatted-number value={loanOutstanding}></lightning-formatted-number></strong>
                    </div>
                </div>
            </section>

            <section class="section-block" aria-labelledby="transactions-title">
                <div class="section-heading">
                    <h3 id="transactions-title">Recent Checking Transactions</h3>
                    <span>{transactionCount} items</span>
                </div>
                <template if:true={hasTransactions}>
                    <ul class="transaction-list">
                        <template for:each={parsedTransactions} for:item="txn">
                            <li key={txn.Id} class="transaction-row">
                                <div class="txn-icon">
                                    <lightning-icon icon-name={txn.iconName} size="xx-small"></lightning-icon>
                                </div>
                                <div class="txn-copy">
                                    <p>{txn.Description}</p>
                                    <span>{txn.formattedDate}</span>
                                </div>
                                <div class={txn.amountClass}>
                                    {txn.sign}₹<lightning-formatted-number value={txn.Amount}></lightning-formatted-number>
                                </div>
                            </li>
                        </template>
                    </ul>
                </template>

                <template if:false={hasTransactions}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                        <span>No recent checking transactions available.</span>
                    </div>
                </template>
            </section>

            <section class="section-block action-panel" aria-labelledby="actions-title">
                <div class="section-heading">
                    <h3 id="actions-title">Suggested Actions</h3>
                </div>
                <ul class="action-list">
                    <li>
                        <span>I need to dispute a recent charge</span>
                        <lightning-button-icon
                            icon-name="utility:copy"
                            variant="border-filled"
                            alternative-text="Copy prompt: dispute a recent charge"
                            title="Copy prompt"
                            data-prompt="I need to dispute a recent charge"
                            onclick={copyPrompt}>
                        </lightning-button-icon>
                    </li>
                    <li>
                        <span>Help me lower my Home Loan EMI</span>
                        <lightning-button-icon
                            icon-name="utility:copy"
                            variant="border-filled"
                            alternative-text="Copy prompt: lower Home Loan EMI"
                            title="Copy prompt"
                            data-prompt="Help me lower my Home Loan EMI"
                            onclick={copyPrompt}>
                        </lightning-button-icon>
                    </li>
                </ul>
                <template if:true={showCopyToast}>
                    <div class="copy-toast" role="status">
                        <lightning-icon icon-name="utility:success" variant="success" size="xx-small"></lightning-icon>
                        <span>Prompt copied. Paste it in the chat.</span>
                    </div>
                </template>
            </section>
        </template>
    </article>
</template>
