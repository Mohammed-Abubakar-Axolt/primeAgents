<template>
    <lightning-card icon-name="standard:omni_supervisor" title="Banking Assistant">
        
        <!-- ================= OTP VERIFICATION SCREEN ================= -->
        <template if:false={sessionVerifiedLocal}>
            <div class="slds-p-around_medium slds-text-align_center">
                <lightning-icon icon-name="standard:shield" size="large" class="slds-m-bottom_medium"></lightning-icon>
                <p class="slds-text-heading_small slds-m-bottom_small">Authentication Required</p>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-bottom_medium">
                    We've sent a secure OTP via SMS to {maskedPhone}.
                </p>

                <!-- Hackathon Demo Magic -->
                <p class="slds-text-body_small slds-text-color_success slds-m-bottom_small">
                    [Demo Only] Your OTP is: <strong>{generatedOtp}</strong>
                </p>

                <div class="slds-form-element slds-m-bottom_medium slds-align_absolute-center" style="width: 150px;">
                    <lightning-input type="text" max-length="4" variant="label-hidden" value={userEnteredOtp} onchange={handleOtpChange} placeholder="Enter OTP" class="slds-text-align_center"></lightning-input>
                </div>

                <template if:true={showError}>
                    <p class="slds-text-color_error slds-m-bottom_small">Incorrect OTP. Please try again.</p>
                </template>

                <lightning-button variant="brand" label="Verify Identity" onclick={verifyOtp} class="slds-m-bottom_medium slds-button_stretch"></lightning-button>
                <a onclick={resendOtp}>Resend OTP</a>
            </div>
        </template>

        <!-- ================= 360 BANKING DASHBOARD SCREEN ================= -->
        <template if:true={sessionVerifiedLocal}>
            <div class="slds-p-horizontal_medium">
                
                <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium slds-p-bottom_small slds-border_bottom">
                    <div>
                        <p class="slds-text-heading_small"><strong>{customerName}</strong></p>
                        <p class="slds-text-body_small slds-text-color_weak">Prefers: {preferredLanguage}</p>
                    </div>
                    <div class="slds-text-align_right">
                        <p class="slds-text-body_small slds-text-color_weak">Retention Risk</p>
                        <lightning-badge label={churnRisk} class={riskBadgeClass}></lightning-badge>
                    </div>
                </div>

                <p class="slds-text-title_caps slds-text-color_weak slds-m-bottom_x-small">Portfolio Overview</p>
                <div class="slds-grid slds-wrap slds-m-bottom_medium">
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <p class="slds-text-body_small">Checking Available</p>
                        <p class="slds-text-color_success slds-text-title_bold">₹<lightning-formatted-number value={checkingBalance}></lightning-formatted-number></p>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <p class="slds-text-body_small">Credit Card Due</p>
                        <p class="slds-text-color_error slds-text-title_bold">₹<lightning-formatted-number value={creditCardBalance}></lightning-formatted-number></p>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <p class="slds-text-body_small">Home Loan Remaining</p>
                        <p class="slds-text-title_bold">₹<lightning-formatted-number value={loanOutstanding}></lightning-formatted-number></p>
                    </div>
                </div>

                <p class="slds-text-title_caps slds-text-color_weak slds-m-bottom_small slds-m-top_medium">Recent Checking Transactions</p>
                <ul class="slds-has-dividers_bottom-space">
                    <template for:each={parsedTransactions} for:item="txn">
                        <li key={txn.Id} class="slds-item slds-grid slds-grid_align-spread slds-p-vertical_x-small">
                            <div>
                                <p class="slds-text-body_regular"><strong>{txn.Description}</strong></p>
                                <p class="slds-text-body_small slds-text-color_weak">{txn.formattedDate}</p>
                            </div>
                            <div class="slds-text-align_right">
                                <p class={txn.amountClass}>
                                    {txn.sign}₹<lightning-formatted-number value={txn.Amount}></lightning-formatted-number>
                                </p>
                            </div>
                        </li>
                    </template>
                </ul>
            </div>
        </template>
    </lightning-card>
</template>
