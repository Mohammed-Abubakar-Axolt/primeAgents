<template>
    <lightning-card icon-name="standard:shield" title="Security Verification">
        
        <!-- STATE 1: Account Not Found -->
        <template if:false={isFound}>
            <div class="slds-p-around_medium slds-text-color_error slds-text-align_center">
                <lightning-icon icon-name="utility:error" variant="error" size="small" class="slds-m-bottom_small"></lightning-icon>
                <p>No customer found with that mobile number. Please try again in the chat.</p>
            </div>
        </template>

        <!-- STATE 2: OTP Verification -->
        <template if:true={showOtpScreen}>
            <div class="slds-p-around_medium slds-text-align_center">
                <p class="slds-text-heading_small slds-m-bottom_small">Hello, <strong>{customerName}</strong></p>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-bottom_medium">
                    We've sent a secure 4-digit OTP to {maskedPhone}
                </p>

                <!-- Hackathon cheat: Show the OTP on screen so judges see it works -->
                <p class="slds-text-body_small slds-text-color_success slds-m-bottom_small">
                    [Demo Only] Your OTP is: <strong>{generatedOtp}</strong>
                </p>

                <div class="slds-form-element slds-m-bottom_medium slds-align_absolute-center" style="width: 150px;">
                    <lightning-input type="text" max-length="4" variant="label-hidden" value={userEnteredOtp} onchange={handleOtpChange} placeholder="Enter OTP" class="slds-text-align_center"></lightning-input>
                </div>

                <template if:true={showError}>
                    <p class="slds-text-color_error slds-m-bottom_small">Incorrect OTP. Please try again.</p>
                </template>

                <lightning-button variant="brand" label="Verify" onclick={verifyOtp} class="slds-m-bottom_medium slds-button_stretch"></lightning-button>

                <div class="slds-grid slds-grid_align-spread slds-m-top_medium">
                    <a onclick={resendOtp}>Resend OTP</a>
                    <a onclick={editNumber}>Edit Number</a>
                </div>
            </div>
        </template>

        <!-- STATE 3: Success & Recommended Actions -->
        <template if:true={isVerified}>
            <div class="slds-p-around_medium">
                <div class="slds-text-align_center slds-m-bottom_medium">
                    <lightning-icon icon-name="action:approval" size="medium" class="slds-m-bottom_small"></lightning-icon>
                    <p class="slds-text-heading_small slds-text-color_success">Verified Successfully</p>
                </div>

                <p class="slds-text-title_caps slds-text-color_weak slds-m-bottom_small">Quick Actions</p>
                
                <ul class="slds-has-dividers_bottom-space">
                    <!-- Action 1 -->
                    <li class="slds-item slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                        <span class="slds-text-body_regular">Check my Everyday Checking Balance</span>
                        <lightning-button-icon icon-name="utility:copy" variant="border-filled" alternative-text="Copy Prompt" data-prompt="Check my Everyday Checking Balance" onclick={copyPrompt}></lightning-button-icon>
                    </li>
                    <!-- Action 2 -->
                    <li class="slds-item slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                        <span class="slds-text-body_regular">I need to dispute a recent charge</span>
                        <lightning-button-icon icon-name="utility:copy" variant="border-filled" alternative-text="Copy Prompt" data-prompt="I need to dispute a recent charge" onclick={copyPrompt}></lightning-button-icon>
                    </li>
                    <!-- Action 3 -->
                    <li class="slds-item slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                        <span class="slds-text-body_regular">Help me lower my Home Loan EMI</span>
                        <lightning-button-icon icon-name="utility:copy" variant="border-filled" alternative-text="Copy Prompt" data-prompt="Help me lower my Home Loan EMI" onclick={copyPrompt}></lightning-button-icon>
                    </li>
                </ul>
                <template if:true={showCopyToast}>
                    <p class="slds-text-color_success slds-text-align_center slds-m-top_small">Prompt copied! Paste it in the chat.</p>
                </template>
            </div>
        </template>

    </lightning-card>
</template>
